<!DOCTYPE html>
<html>
    <head>
        <title>Forecast Engine API</title>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <link rel="stylesheet" href="/static/styles.css">
    </head>
    <body>
        <h1>Forecast Engine API</h1>
        <p style="text-align: center;">Status: <span class="status">Live</span></p>
        <button onclick="toggleDarkMode()">Toggle Dark Mode</button>
        
        <div class="form-container">
            <h2>Order Forecasting</h2>
            <textarea id="query" placeholder="Enter query: mention Restaurant id, Target date, Promo_flag for forecasting (e.g., 123 2023-10-01 1)" style="width: 60%; height: 100px; resize: vertical;"></textarea>
            <br>
            <button onclick="sendPrediction()">Get Forecast</button>
        </div>

        <div class="results" id="results"></div>
    </body>
    <script src="/static/script.js"></script>
</html>
